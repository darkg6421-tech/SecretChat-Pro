<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SecretChat Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>" />
</head>
<body>
  <!-- ============ Ambient Background ============ -->
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ============ JOIN ROOM SCREEN ============ -->
  <div id="joinScreen" class="screen active">
    <div class="join-container glass-card">
      <div class="join-logo">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="url(#logoGrad)" />
            <path d="M14 20C14 16.6863 16.6863 14 20 14H28C31.3137 14 34 16.6863 34 20V26C34 29.3137 31.3137 32 28 32H22L17 36V32H20C16.6863 32 14 29.3137 14 26V20Z" fill="white" fill-opacity="0.9"/>
            <circle cx="21" cy="23" r="2" fill="url(#logoGrad)"/>
            <circle cx="27" cy="23" r="2" fill="url(#logoGrad)"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#6C63FF"/>
                <stop offset="1" stop-color="#B06AB3"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="join-title">SecretChat <span class="pro-badge">PRO</span></h1>
        <p class="join-subtitle">End-to-end encrypted conversations for two</p>
      </div>

      <form id="joinForm" class="join-form" autocomplete="off">
        <div class="input-group">
          <label for="usernameInput">Your Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="usernameInput" placeholder="Enter your name" maxlength="20" required />
          </div>
        </div>

        <div class="input-group">
          <label for="roomInput">Room Code</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="text" id="roomInput" placeholder="Enter room code" maxlength="30" required />
          </div>
        </div>

        <button type="submit" id="joinBtn" class="btn-primary">
          <span class="btn-text">Join Room</span>
          <span class="btn-loader" hidden>
            <span class="spinner"></span>
          </span>
          <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>

      <div class="join-footer">
        <div class="security-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>Secure & Private</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ CHAT SCREEN ============ -->
  <div id="chatScreen" class="screen">
    <div class="chat-container">
      <!-- Header -->
      <header class="chat-header glass-card">
        <div class="header-left">
          <button id="leaveBtn" class="btn-icon" title="Leave Room">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <div class="header-info">
            <h2 class="room-name" id="roomNameDisplay">Room</h2>
            <div class="partner-status" id="partnerStatus">
              <span class="status-dot offline"></span>
              <span class="status-text">Waiting for partner…</span>
            </div>
          </div>
        </div>
        <div class="header-right">
          <div class="partner-avatar" id="partnerAvatarHeader" hidden>
            <span class="avatar-initials"></span>
          </div>
          <button id="menuBtn" class="btn-icon" title="Options">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
        </div>
      </header>

      <!-- Waiting Overlay -->
      <div id="waitingOverlay" class="waiting-overlay">
        <div class="waiting-content">
          <div class="waiting-pulse">
            <div class="pulse-ring"></div>
            <div class="pulse-ring delay-1"></div>
            <div class="pulse-ring delay-2"></div>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </div>
          <h3>Waiting for partner</h3>
          <p>Share the room code so they can join</p>
          <div class="room-code-display" id="roomCodeCopy">
            <span id="roomCodeText"></span>
            <button class="copy-btn" id="copyRoomCode" title="Copy room code">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Messages Area -->
      <div class="messages-area" id="messagesArea">
        <div class="messages-list" id="messagesList"></div>
        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator" hidden>
          <div class="typing-avatar">
            <span class="avatar-initials" id="typingAvatarInitials">?</span>
          </div>
          <div class="typing-bubble">
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Message Input -->
      <div class="message-input-area glass-card" id="inputArea">
        <div class="input-bar">
          <textarea id="messageInput" placeholder="Type a message…" rows="1" maxlength="2000" disabled></textarea>
          <button id="sendBtn" class="btn-send" disabled title="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Firebase App Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
